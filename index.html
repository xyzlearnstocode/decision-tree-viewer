<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Decision Tree</title><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f7f4ee'/%3E%3Cpath d='M32 8 14 32h10L10 50h44L40 32h10L32 8Z' fill='%2316875d'/%3E%3Cpath d='M29 45h6v13h-6z' fill='%23815a2b'/%3E%3C/svg%3E"><style>:root{--ink:#18212f;--muted:#5e6877;--blue:#246bfe;--green:#16875d;--red:#c4314b;--paper:#f7f4ee;--panel:#fff}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:var(--paper);font:14px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{padding:22px 28px 14px;border-bottom:1px solid #c6ced8;background:#fffdf8}.top{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;align-items:center}h1{margin:0;font-size:28px}.sub{margin-top:6px;color:var(--muted)}.upload{display:inline-flex;align-items:center;border:1px solid #c9d4e2;border-radius:7px;background:#fff;font-weight:750;padding:8px 11px;cursor:pointer}.upload input{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}#status{color:var(--muted);font-size:12px;margin-left:10px}.app{display:grid;grid-template-columns:minmax(680px,1fr)390px;min-height:calc(100vh - 88px)}.wrap{overflow:auto;padding:24px}.map{position:relative;width:1800px;height:1200px;border:1px solid #c6ced8;border-radius:8px;background:linear-gradient(rgba(24,33,47,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(24,33,47,.035) 1px,transparent 1px),#fffdfa;background-size:28px 28px;box-shadow:0 18px 46px #18212f1f}svg{position:absolute;inset:0;pointer-events:none}.card{position:absolute;display:flex;flex-direction:column;gap:9px;width:360px;min-width:260px;min-height:120px;padding:15px;border:1px solid #b9c3d1;border-radius:8px;background:var(--panel);box-shadow:0 8px 24px #18212f14;cursor:grab;resize:both;overflow:auto;user-select:none}.card.drag{cursor:grabbing;z-index:5}.card.active{border-color:var(--blue);box-shadow:0 10px 28px #246bfe2e}.card.end{background:#fff7f8;border-color:#c4314b80}.uid{color:var(--blue);font-weight:800;font-size:12px;text-transform:uppercase}.q{font-weight:720;font-size:15px}.meta{color:var(--muted);font-size:12px}.tools{position:absolute;top:9px;right:9px}.fit{border:1px solid #d7e0eb;border-radius:7px;background:#fff;color:#445064;font:inherit;font-size:11px;font-weight:750;padding:6px 8px;cursor:pointer}.branches{display:flex;flex-direction:column;gap:7px;min-height:0}.br{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;padding:8px 9px;border:1px solid #e1e7ef;border-radius:7px;background:#fbfcfe;font-size:12px;line-height:1.25;cursor:pointer}.br:hover,.br.active{border-color:var(--green);background:#f4fbf7}.br.term{border-color:#dfbd82;background:#fff9ee}.br.viol{border-color:#c4314b6b;background:#fff7f8}.tag{white-space:nowrap;color:var(--muted);font-size:11px;font-weight:750;text-transform:uppercase}aside{border-left:1px solid #c6ced8;background:#ffffffc7;padding:22px;overflow:auto}.panel{padding:18px;border:1px solid #c6ced8;border-radius:8px;background:#fff;box-shadow:0 10px 28px #18212f14}.panel h2{margin:0 0 8px;font-size:20px}.panel h3{margin:20px 0 8px;font-size:13px;text-transform:uppercase}.detail-branch{padding:10px 0;border-top:1px solid #e8edf3;cursor:pointer}.detail-branch strong{display:block}.content{white-space:pre-wrap}.example{padding:10px;border:1px solid #e4e9f0;border-radius:8px;background:#fbfcfe;margin-top:10px}@media(max-width:980px){.app{grid-template-columns:1fr}aside{border-left:0;border-top:1px solid #c6ced8}}</style></head><body><header><div class="top"><div><h1>Decision Tree</h1><div class="sub">Interactive decision tree viewer. Upload a JSON file, then drag, resize, and inspect the cards.</div></div><div><label class="upload">Upload JSON<input id="file" type="file" accept=".json,application/json"></label><span id="status">Ready</span></div></div></header><main class="app"><section class="wrap"><div class="map" id="map"><svg id="svg"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#9aa7b6"></path></marker></defs></svg></div></section><aside><div class="panel" id="details"></div></aside></main><script>let raw={startUid:"start",graph:{start:{uid:"start",type:"FREEFORM",label:"Upload a JSON decision tree to begin.",indicators:[{indicatorUid:"upload",indicatorName:"Use the Upload JSON button in the header.",nextConditionUids:[],indicatorContent:"Choose a JSON file with a startUid and graph object."}]}}};let payload,edges=[],cards=new Map();const map=document.getElementById('map'),svg=document.getElementById('svg'),details=document.getElementById('details'),status=document.getElementById('status');const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const clean=s=>esc(s||'').replace(/^### (.*)$/gm,'$1').replace(/\*\*(.*?)\*\*/g,'$1');function validate(d){if(!d||typeof d!=='object'||!d.graph||typeof d.graph!=='object')throw Error('This JSON does not contain a graph object.');const start=d.startUid||Object.keys(d.graph)[0];if(!start||!d.graph[start])throw Error('The startUid is missing or does not exist in graph.');return start}function make(d){const start=validate(d),g=d.graph,pos={},size={},nodes=[];edges=[];const known={cond3:[40,115],cond4:[500,70],cond1:[500,370],cond2:[960,205],violation_end:[1420,335]},ks={cond3:[360,545],cond4:[360,225],cond1:[360,290],cond2:[360,390],violation_end:[310,110]};if(Object.keys(known).every(k=>g[k])){Object.assign(pos,JSON.parse(JSON.stringify(known)));Object.assign(size,JSON.parse(JSON.stringify(ks)))}else{const levels=new Map([[start,0]]),q=[start];while(q.length){const u=q.shift(),l=levels.get(u);for(const ind of g[u]?.indicators||[])for(const t of ind.nextConditionUids||[])if(g[t]&&!levels.has(t)){levels.set(t,l+1);q.push(t)}}Object.keys(g).forEach(u=>{if(!levels.has(u))levels.set(u,Math.max(0,...levels.values())+1)});const by={};for(const [u,l]of levels)(by[l]??=[]).push(u);Object.entries(by).forEach(([l,arr])=>arr.forEach((u,i)=>pos[u]=[40+l*460,70+i*270]))}for(const [uid,node]of Object.entries(g)){const n=(node.indicators||[]).length;if(!pos[uid])pos[uid]=[40+nodes.length*40,80+nodes.length*40];if(!size[uid])size[uid]=node.type==='END'?[310,110]:[360,Math.min(620,Math.max(210,150+n*44))];nodes.push({uid,node});for(const ind of node.indicators||[])for(const t of ind.nextConditionUids||[])if(g[t])edges.push({from:uid,to:t,indicator:ind})}return{startUid:start,graph:g,pos,size,nodes}}function next(ind){const n=ind.nextConditionUids||[];return n.includes('violation_end')?'violation':n.length?n.join(', '):'end'}function cls(ind){const n=ind.nextConditionUids||[];return n.includes('violation_end')?' viol':n.length?'':' term'}function center(uid,side){const [x,y]=payload.pos[uid],[w,h]=payload.size[uid];return side==='left'?[x,y+h/2]:side==='top'?[x+w/2,y]:side==='bottom'?[x+w/2,y+h]:[x+w,y+h/2]}function path(e){let a,b;if(e.from==='cond4'&&e.to==='cond1'){a=center(e.from,'bottom');b=center(e.to,'top')}else{a=center(e.from,'right');b=center(e.to,'left')}const dx=Math.max(70,Math.abs(b[0]-a[0])/2);return`M ${a[0]} ${a[1]} C ${a[0]+dx} ${a[1]}, ${b[0]-dx} ${b[1]}, ${b[0]} ${b[1]}`}function draw(){svg.querySelectorAll('.conn').forEach(p=>p.remove());const seen=new Set;for(const e of edges){const k=e.from+'-'+e.to;if(seen.has(k))continue;seen.add(k);const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.classList.add('conn');p.setAttribute('d',path(e));p.setAttribute('fill','none');p.setAttribute('stroke',e.to==='violation_end'?'#c4314b':'#9aa7b6');p.setAttribute('stroke-width','2.4');p.setAttribute('marker-end','url(#arrow)');svg.appendChild(p)}}function detailNode(uid){document.querySelectorAll('.active').forEach(e=>e.classList.remove('active'));cards.get(uid)?.classList.add('active');const n=payload.graph[uid];details.innerHTML=`<h2>${esc(uid)}${uid===payload.startUid?' · Start':''}</h2><div class="content">${esc(n.label)}</div><h3>Branches</h3>${(n.indicators||[]).map(i=>`<div class="detail-branch" data-i="${esc(i.indicatorUid)}"><strong>${esc(i.indicatorName)}</strong><span>Next: ${esc((i.nextConditionUids||[]).join(', ')||'terminal')}</span></div>`).join('')||'<div>No branches.</div>'}`;details.querySelectorAll('[data-i]').forEach(e=>e.onclick=()=>detailBranch(e.dataset.i))}function detailBranch(id){document.querySelectorAll('.active').forEach(e=>e.classList.remove('active'));document.querySelectorAll(`[data-i="${CSS.escape(id)}"]`).forEach(e=>e.classList.add('active'));let parent='',ind;for(const [u,n]of Object.entries(payload.graph)){ind=(n.indicators||[]).find(i=>i.indicatorUid===id);if(ind){parent=u;break}}if(!ind)return;details.innerHTML=`<h2>${esc(ind.indicatorName)}</h2><div class="content">From ${esc(parent)} · Next: ${esc((ind.nextConditionUids||[]).join(', ')||'terminal')}</div><h3>Criteria</h3><div class="content">${clean(ind.indicatorContent||'No detail text.')}</div>${(ind.examples||[]).slice(0,6).map(ex=>`<div class="example"><strong>${esc(ex.type||'example')}</strong><br>${esc(ex.content||'')}</div>`).join('')}`}function fit(uid){const c=cards.get(uid);if(!c)return;c.style.height='auto';payload.size[uid]=[c.offsetWidth,c.scrollHeight+16];c.style.height=payload.size[uid][1]+'px';draw()}function drag(c,uid){let d=null;c.onpointerdown=e=>{if(e.button!==0||e.target.closest('.br,.fit'))return;d={x:e.clientX,y:e.clientY,l:payload.pos[uid][0],t:payload.pos[uid][1],m:false};c.setPointerCapture?.(e.pointerId);c.classList.add('drag')};c.onpointermove=e=>{if(!d)return;const dx=e.clientX-d.x,dy=e.clientY-d.y;d.m=Math.abs(dx)+Math.abs(dy)>4;payload.pos[uid]=[Math.max(20,d.l+dx),Math.max(20,d.t+dy)];c.style.left=payload.pos[uid][0]+'px';c.style.top=payload.pos[uid][1]+'px';draw()};c.onpointerup=e=>{if(!d)return;const moved=d.m;d=null;c.classList.remove('drag');if(moved)e.stopPropagation()};new ResizeObserver(()=>{payload.size[uid]=[c.offsetWidth,c.offsetHeight];draw()}).observe(c)}function render(){cards.clear();map.querySelectorAll('.card').forEach(e=>e.remove());payload=make(raw);const maxX=Math.max(1800,...Object.entries(payload.pos).map(([u,p])=>p[0]+payload.size[u][0]+220)),maxY=Math.max(1200,...Object.entries(payload.pos).map(([u,p])=>p[1]+payload.size[u][1]+220));map.style.width=maxX+'px';map.style.height=maxY+'px';svg.setAttribute('width',maxX);svg.setAttribute('height',maxY);svg.setAttribute('viewBox',`0 0 ${maxX} ${maxY}`);for(const {uid,node}of payload.nodes){const c=document.createElement('div'),[x,y]=payload.pos[uid],[w,h]=payload.size[uid];c.className='card'+(node.type==='END'?' end':'');c.dataset.node=uid;c.style.cssText+=`left:${x}px;top:${y}px;width:${w}px;height:${h}px`;c.innerHTML=`<div class="tools"><button class="fit">Fit</button></div><div class="uid">${esc(uid)}${uid===payload.startUid?' · Start':''}</div><div class="q">${esc(node.label)}</div><div class="meta">${node.type==='END'?'Endpoint':(node.indicators||[]).length+' branches'}</div><div class="branches">${(node.indicators||[]).map(i=>`<div class="br${cls(i)}" data-i="${esc(i.indicatorUid)}"><span>${esc(i.indicatorName)}</span><span class="tag">${esc(next(i))}</span></div>`).join('')}</div>`;c.onclick=()=>detailNode(uid);c.querySelector('.fit').onclick=e=>{e.stopPropagation();fit(uid)};c.querySelectorAll('.br').forEach(b=>{b.onclick=e=>{e.stopPropagation();detailBranch(b.dataset.i)}});map.appendChild(c);cards.set(uid,c);drag(c,uid)}draw();detailNode(payload.startUid)}document.getElementById('file').onchange=async e=>{const f=e.target.files[0];if(!f)return;status.textContent='Loading...';try{raw=JSON.parse(await f.text());render();status.textContent='Loaded '+f.name}catch(err){status.textContent=err.message||'Could not load JSON'}e.target.value=''};render();</script></body></html>
